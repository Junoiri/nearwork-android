name: Android CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Assemble Debug
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Lint Debug
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Unit Tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-debug-reports
          if-no-files-found: ignore
          path: |
            app/app/build/reports/lint-results-debug.html
            app/app/build/reports/lint-results-debug.xml
